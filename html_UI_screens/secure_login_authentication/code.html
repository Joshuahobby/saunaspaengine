<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13eca4",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Secure Login | Sauna SPA Engine</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 md:px-10 py-4 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<span class="material-symbols-outlined text-4xl">spa</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Sauna SPA Engine</h2>
</div>
<div class="flex items-center gap-4 md:gap-8">
<div class="hidden md:flex items-center gap-6">
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Help Center</a>
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Security Policy</a>
</div>
<button class="flex min-w-[120px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-background-dark text-sm font-bold leading-normal tracking-[0.015em] hover:opacity-90 transition-opacity">
<span class="truncate">Contact Support</span>
</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-[480px] flex flex-col gap-6">
<!-- Branding & Hero Image Card -->
<div class="rounded-xl overflow-hidden shadow-sm border border-primary/10">
<div class="bg-cover bg-center flex flex-col justify-end min-h-[180px] relative" data-alt="Luxurious modern spa interior with warm ambient lighting" style='background-image: linear-gradient(0deg, rgba(16, 34, 28, 0.8) 0%, rgba(16, 34, 28, 0.2) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuB_gNoR6snH9i9pBWO49YSPbEyj0SEa8-bEaOwbzuk7NCYlBAzqyA3L48hGeNnsnP1LpceIU0d_sE43ndkTrg1VXQupm5-Nu3oOLQDlReiGn17m9urIUmFDeZQOQiIx_jHn5odUGGy_A-1az_ZJTxAha30zJQ2rMwVhdqyJAkiG17lhxDM5DU_UrVZP4oasQnpg82Sih3FduwAsVNy7RPgQsSE3LZP9f4qrKXcZAKL7FZW5DRHfQdbmVm5TKrTYuSdJfxNRJLndo3Tp");'>
<div class="p-6">
<span class="bg-primary text-background-dark text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded mb-2 inline-block">Staff Portal</span>
<h1 class="text-white tracking-tight text-3xl font-extrabold leading-tight">Secure Authentication</h1>
</div>
</div>
</div>
<!-- Login Form -->
<div class="bg-white dark:bg-slate-900/50 p-6 md:p-8 rounded-xl shadow-lg border border-primary/5">
<div class="text-center mb-8">
<h2 class="text-slate-900 dark:text-white text-2xl font-bold">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Access your spa operations dashboard</p>
</div>
<form class="space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold ml-1">Username or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-primary/20 bg-background-light dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 transition-all" placeholder="name@saunaspa.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-bold hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-primary/20 bg-background-light dark:bg-background-dark focus:border-primary focus:ring-1 focus:ring-primary outline-none text-slate-900 dark:text-slate-100 placeholder:text-slate-400 transition-all" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="rounded border-primary/30 text-primary focus:ring-primary bg-background-light dark:bg-background-dark cursor-pointer" id="remember" type="checkbox"/>
<label class="text-slate-600 dark:text-slate-400 text-sm cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<button class="w-full py-4 bg-primary hover:bg-primary/90 text-background-dark font-bold rounded-lg shadow-md shadow-primary/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">login</span>
                                Sign In to Dashboard
                            </button>
</form>
<div class="mt-8 pt-6 border-t border-primary/10 text-center">
<p class="text-slate-400 text-xs flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">verified_user</span>
                                256-bit Encrypted Connection
                            </p>
</div>
</div>
<!-- Footer Links -->
<div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-slate-400 text-xs font-medium">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Cookie Settings</a>
<span class="hidden md:inline text-primary/20">•</span>
<p>© 2024 Sauna SPA Engine</p>
</div>
</div>
</main>
</div>
</div>
</body></html>
